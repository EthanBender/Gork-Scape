<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Goblin Empire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">
<!-- Redesign type voices: Fredoka (juicy display), Nunito (body), Space Mono (system/labels) -->
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<style>
  :root {
    --font-display: "Baloo 2", "Segoe UI", Tahoma, sans-serif;
    --font-ui: "Segoe UI", Tahoma, sans-serif;
    --bg: #14130f;
    --panel: #26221a;
    --panel2: #322d21;
    --panel-hi: #3d3728;      /* raised bevel highlight */
    --panel-lo: #191710;      /* recessed well */
    --border: #4a4331;
    --bevel-hi: #6b6144;      /* light edge of a bevel */
    --bevel-lo: #0d0c08;      /* dark edge of a bevel */
    --text: #efe8d4;
    --muted: #a89c7d;
    --accent: #7bbf4a;
    --accent-dk: #4d7a2f;
    --gold: #e8c65a;
    --gold-dk: #a8842a;
    /* Reusable OSRS-style carved chrome */
    --raise: inset 1px 1px 0 var(--bevel-hi), inset -1px -1px 0 var(--bevel-lo);
    --sink: inset 1px 1px 3px rgba(0,0,0,.6), inset -1px -1px 0 rgba(255,255,255,.04);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: "Segoe UI", Tahoma, sans-serif; overflow: hidden;
    -webkit-font-smoothing: antialiased; -webkit-text-size-adjust: 100%;
    overscroll-behavior: none; }
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
  /* touch-action must be on the ACTUAL <canvas> Phaser injects, not just the wrapper —
     it doesn't inherit. Without this the canvas is touch-action:auto, so iOS reads taps
     as scroll/pan gestures (especially after scrolling the panel below it in the stacked
     mobile layout) and the player stops responding to taps. none = every touch is the game's. */
  #game-canvas, #game-canvas canvas { touch-action: none; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
  html, body { overscroll-behavior: none; } /* no rubber-band scroll stealing touches on iPad */

  /* Themed scrollbars */
  * { scrollbar-width: thin; scrollbar-color: var(--border) var(--panel-lo); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--panel-lo); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px;
    border: 2px solid var(--panel-lo); }
  ::-webkit-scrollbar-thumb:hover { background: var(--bevel-hi); }

  /* Top bar — AAA redesign: warm gradient bar, identity cluster + chip row. */
  #topbar { flex: 0 0 auto; display: flex; align-items: center; gap: 12px;
    padding: 8px 14px; background: linear-gradient(#33271b, #271e14);
    border-bottom: 1px solid #4a3927; box-shadow: 0 2px 10px rgba(0,0,0,.35);
    font-family: "Nunito", "Segoe UI", Tahoma, sans-serif; font-size: 13px; }
  /* Identity cluster: avatar + name + combat pill. */
  #topbar .tb-id { display: flex; align-items: center; gap: 9px; flex: 0 0 auto; }
  #topbar .tb-avatar { width: 34px; height: 34px; border-radius: 10px; overflow: hidden;
    border: 2px solid #b7862f; background: #2c2438; box-shadow: 0 2px 6px rgba(0,0,0,.4); flex: 0 0 auto; }
  #topbar .tb-avatar img { width: 170%; height: 170%; object-fit: cover;
    object-position: 50% 6%; transform: translate(-20%, -6%); }
  #topbar #tb-name { font-family: "Fredoka", sans-serif; font-weight: 600; font-size: 16px;
    color: #f4e7c8; line-height: 1; }
  #topbar .tb-combat { display: inline-flex; align-items: center; gap: 4px; margin-top: 3px;
    padding: 1px 8px; border-radius: 99px; background: #7c3b4e; color: #ffe0e8;
    font-family: "Fredoka", sans-serif; font-size: 10.5px; font-weight: 800; letter-spacing: .3px;
    text-transform: uppercase; }
  #topbar .tb-combat svg { width: 11px; height: 11px; }
  #topbar .tb-div { width: 1px; height: 26px; background: #4a3927; flex: 0 0 auto; }
  /* Stat chips (location, gp, world time/event, net status). */
  #topbar .tb { display: inline-flex; align-items: center; gap: 6px; flex: 0 0 auto;
    padding: 5px 11px; border-radius: 99px; color: #cdbf9e;
    background: rgba(0,0,0,.2); border: 1px solid #3c2e1f; }
  #topbar .tb b { color: #f0d488; font-weight: 800; }
  #topbar .tb-ico { display: inline-flex; width: 14px; height: 14px; flex: 0 0 14px;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,.5)); }
  #topbar .tb-ico svg { width: 100%; height: 100%; }
  /* Debug readouts (tick, fps) — de-emphasized to the far right per design. */
  #topbar #tb-tick, #topbar #tb-fps { background: transparent; border: none; padding: 4px 6px;
    font-family: "Space Mono", monospace; font-size: 11px; color: #8a7a5c; opacity: .6; }

  /* Main split */
  #main { flex: 1 1 auto; display: flex; min-height: 0; }
  #game-panel { flex: 7 1 0; min-width: 0; position: relative; background: #000; }
  #game-canvas { width: 100%; height: 100%; }
  #side-panel { flex: 3 1 0; min-width: 258px; max-width: 360px; display: flex;
    flex-direction: column; min-height: 0; /* let panel-content scroll instead of overflowing into the chat (mobile stacked layout) */
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,.012) 0 1px, transparent 1px 4px),
      repeating-linear-gradient(-45deg, rgba(0,0,0,.06) 0 1px, transparent 1px 5px),
      linear-gradient(180deg, #2b2117, #211910);
    border-left: 1px solid #4a3927; box-shadow: inset 1px 0 0 rgba(255,255,255,.03); }

  /* Tab bar — AAA redesign: active tab = cream on #3a2c1e w/ a 3px olive underline;
     inactive tabs grayscaled. */
  #tabbar { display: flex; flex: 0 0 auto; background: #1c150d;
    border-bottom: 1px solid #4a3927;
    overflow-x: auto; scrollbar-width: none; } /* world panels add up to 10 tabs — scroll, don't clip */
  #tabbar::-webkit-scrollbar { display: none; }
  .tab-btn { flex: 1 0 auto; min-width: 52px; padding: 8px 2px 6px; color: #a89877;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: transparent;
    border: none; border-bottom: 3px solid transparent;
    cursor: pointer; font-family: "Fredoka", sans-serif; transition: color .12s, background .12s; }
  .tab-btn .tab-icon { width: 20px; height: 20px; line-height: 1;
    filter: grayscale(.85) brightness(.9) drop-shadow(0 1px 1px rgba(0,0,0,.5));
    transition: filter .15s, transform .15s; }
  .tab-btn .tab-icon svg { width: 100%; height: 100%; display: block; }
  .tab-btn .tab-label { font-size: 10px; font-weight: 600; letter-spacing: .2px;
    font-family: "Fredoka", sans-serif; }
  .tab-btn:last-child { border-right: none; }
  .tab-btn:hover { color: #ebdfc8; background: rgba(255,255,255,.03); }
  .tab-btn.active { color: #f4e7c8; background: #3a2c1e; border-bottom-color: #9fb04e; }
  .tab-btn.active .tab-icon { filter: drop-shadow(0 1px 1px rgba(0,0,0,.5));
    transform: translateY(-1px) scale(1.06); }

  #panel-content { flex: 1 1 auto; overflow-y: auto; padding: 10px; }

  /* Skills */
  /* Skill chips — AAA redesign: parchment icon tile, name, gold level badge, olive XP bar. */
  .skills-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .skill-cell { display: grid; grid-template-columns: 26px 1fr auto; align-items: center; column-gap: 7px;
    padding: 8px 9px 9px;
    background: linear-gradient(#2a1f14, #231a11);
    border: 1px solid #3c2e1f; border-radius: 12px; box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    transition: box-shadow .1s; }
  .skill-cell:hover { box-shadow: inset 0 0 0 1px rgba(159,176,78,.45); }
  .skill-icon { width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center;
    padding: 4px; border-radius: 8px; background: linear-gradient(#efe0bd, #d9c39a);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.55), 0 1px 2px rgba(0,0,0,.4); }
  .skill-icon svg { width: 100%; height: 100%; display: block; filter: drop-shadow(0 1px 1px rgba(0,0,0,.35)); }
  .skill-name { font-family: "Nunito", sans-serif; font-weight: 700; font-size: 12px; color: #ebdfc8;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .skill-cell .lvl { font-family: "Fredoka", sans-serif; font-size: 11.5px; font-weight: 700; color: #3a2a10;
    background: linear-gradient(#e7c76b, #c99a2f); border-radius: 99px; padding: 1px 7px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.45), 0 1px 2px rgba(0,0,0,.35); }
  .skill-cell .xpbar { grid-column: 1 / -1; height: 5px; margin: 8px 0 0; }
  .xpbar { height: 7px; background: #17110a; border-radius: 99px; overflow: hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,.55); }
  .xpfill { height: 100%; background: linear-gradient(#c3d46a, #9fb04e);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.4); }
  .xptext { font-size: 10px; color: #a89877; }
  .skill-next { font-size: 9px; color: var(--accent); margin-top: 2px; opacity: 0.85; }
  .skill-foot { margin-top: 12px; text-align: center; color: var(--gold); font-size: 12px; font-weight: 600;
    padding: 8px; background: var(--panel-lo); border-radius: 5px; box-shadow: var(--sink);
    text-shadow: 0 1px 0 #000; }

  /* Inventory */
  /* Item slots — AAA redesign: warm slot tiles w/ wood borders + gold qty badge. */
  .inv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    padding: 10px; background: #1c150d; border-radius: 12px; box-shadow: inset 0 2px 6px rgba(0,0,0,.5); }
  .inv-slot { position: relative; aspect-ratio: 1; background: linear-gradient(#2a1f14, #231a11);
    border: 1px solid #6b4a2a; border-radius: 10px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.04), inset 0 -2px 3px rgba(0,0,0,.35);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: box-shadow .1s; }
  .inv-slot:hover { box-shadow: inset 0 0 0 1px rgba(224,180,74,.5); }
  .item-qty { position: absolute; top: 2px; left: 4px; font-family: "Fredoka", sans-serif; font-size: 10px; font-weight: 700;
    color: #f0d488; text-shadow: 0 0 2px #000, 0 0 2px #000; pointer-events: none; z-index: 1; }
  .inv-slot.selected { box-shadow: inset 0 0 0 2px #e0b44a, 0 0 6px rgba(224,180,74,.45); }
  .inv-slot.dragging { opacity: .4; }
  .inv-slot.drag-over { box-shadow: inset 0 0 0 2px #9fb04e, 0 0 6px rgba(159,176,78,.5); }
  .inv-slot[draggable="true"] { cursor: grab; }
  .inv-slot[draggable="true"]:active { cursor: grabbing; }
  .item-sq { width: 90%; height: 90%; display: flex; align-items: center; justify-content: center;
    font-size: 20px; line-height: 1; filter: drop-shadow(0 1px 1px rgba(0,0,0,.45)); }
  .inv-hint { margin-top: 10px; font-size: 11px; color: #a89877; text-align: center; }
  .inv-head { margin-bottom: 8px; font-family: "Fredoka", sans-serif; font-size: 13px; font-weight: 700; color: #e0b44a;
    text-align: center; }
  .skill-cell.sg-clickable { cursor: pointer; }
  /* Modal (skill guide + reusable popups) */
  .modal-overlay { position: fixed; inset: 0; z-index: 200; display: flex;
    align-items: center; justify-content: center; background: rgba(0,0,0,.55); }
  /* the bank (and any persistent modal) closes by toggling the `hidden` attribute —
     without this rule the display:flex above overrides hidden, so the invisible
     fullscreen overlay stays rendered and eats every tap ("can't exit the bank"). */
  .modal-overlay[hidden] { display: none; }
  .modal-panel { width: min(420px, 92vw); max-height: 82vh; display: flex; flex-direction: column;
    background: linear-gradient(180deg, var(--panel-hi), var(--panel));
    border: 2px solid var(--bevel-lo); border-radius: 8px;
    box-shadow: var(--raise), 0 10px 34px rgba(0,0,0,.6); }
  .modal-head { display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; border-bottom: 1px solid var(--bevel-lo); }
  .modal-title { color: var(--gold); font-weight: 700; text-shadow: 0 1px 0 #000;
    font-family: var(--font-display); font-size: 15px; }
  .modal-close { width: 26px; height: 26px; cursor: pointer; color: var(--muted);
    background: var(--panel2); border: 1px solid var(--bevel-lo); border-radius: 4px; }
  .modal-close:hover { color: var(--text); background: var(--panel-hi); }
  .modal-sub { padding: 6px 12px; font-size: 11px; color: var(--muted);
    border-bottom: 1px solid var(--bevel-lo); }
  .modal-body { overflow-y: auto; padding: 8px; }
  /* Bank modal: Bank | Inventory side-by-side */
  .bank-panel { width: min(760px, 95vw); max-height: 88vh; }
  .bank-slots { font-size: 12px; font-weight: 700; }
  .bank-actions { display: flex; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--bevel-lo); }
  .bank-qty { display: flex; align-items: center; gap: 5px; padding: 6px 12px; font-size: 11px;
    color: var(--muted); border-bottom: 1px solid var(--bevel-lo); }
  .bank-q { min-width: 32px; padding: 4px 7px; font-size: 11px; font-weight: 700; cursor: pointer;
    color: var(--muted); background: var(--panel2); border: 1px solid var(--bevel-lo); border-radius: 4px; }
  .bank-q:hover { color: var(--text); background: var(--panel-hi); }
  .bank-q.active { color: #1a1710; background: var(--gold); border-color: var(--gold-dk); text-shadow: none; }
  .bank-cols { display: flex; gap: 12px; padding: 12px; overflow-y: auto; }
  .bank-col { flex: 1 1 0; min-width: 0; }
  .bank-col-title { font-size: 11px; color: var(--muted); margin-bottom: 6px; text-align: center; }
  .bank-cols .inv-grid { grid-template-columns: repeat(4, 1fr); }
  .skill-guide .sg-row { display: flex; align-items: center; gap: 8px; padding: 5px 8px;
    border-radius: 4px; font-size: 12px; }
  .skill-guide .sg-row + .sg-row { margin-top: 3px; }
  .sg-lvl { flex: 0 0 32px; text-align: center; font-weight: 700; color: var(--gold);
    background: var(--panel-lo); border-radius: 3px; padding: 2px 0; box-shadow: var(--sink); }
  .sg-name { flex: 1; min-width: 0; }
  .sg-kind { flex: 0 0 auto; font-size: 9px; color: var(--muted); text-transform: uppercase;
    letter-spacing: .3px; opacity: .7; }
  .sg-state { flex: 0 0 auto; width: 16px; text-align: center; }
  .sg-open { background: rgba(123,191,74,.09); }
  .sg-open .sg-name { color: var(--text); }
  .sg-locked { opacity: .5; }
  .sg-locked .sg-name { color: var(--muted); }
  .sg-empty { padding: 16px; text-align: center; color: var(--muted); font-size: 12px; }
  /* World-panel header (shop / bank / exchange / station) */
  .wp-header { display: flex; align-items: center; justify-content: space-between;
    margin: -12px -12px 10px; padding: 8px 12px;
    background: linear-gradient(180deg, var(--panel-hi), var(--panel2));
    border-bottom: 1px solid var(--bevel-lo); box-shadow: 0 2px 5px rgba(0,0,0,.35); }
  .wp-title { color: var(--gold); font-weight: 700; font-size: 15px; text-shadow: 0 1px 0 #000;
    font-family: var(--font-display); display: inline-flex; align-items: center; gap: 7px; }
  .wp-title svg { width: 18px; height: 18px; filter: drop-shadow(0 1px 1px rgba(0,0,0,.5)); }
  .wp-close { width: 24px; height: 24px; flex: 0 0 24px; cursor: pointer; color: var(--muted);
    background: var(--panel2); border: 1px solid var(--bevel-lo); border-radius: 4px;
    box-shadow: var(--raise); line-height: 1; }
  .wp-close:hover { color: var(--text); background: var(--panel-hi); }
  /* Item icons: real-art <img> → crafted <svg> → emoji, all fill the slot. */
  .item-sq > svg, .doll-slot > svg,
  .item-sq > img, .doll-slot > img { display: block; width: 100%; height: 100%; object-fit: contain; }
  .item-emoji { line-height: 1; }

  /* Equipment — AAA redesign: wood-bordered paper-doll, mono empty labels. */
  .paperdoll { display: grid; grid-template-columns: repeat(3, 48px); gap: 8px; justify-content: center;
    margin: 2px auto 12px; padding: 10px; background: #1c150d; border-radius: 12px;
    box-shadow: inset 0 2px 6px rgba(0,0,0,.5); }
  .doll-slot, .doll-empty { width: 48px; height: 48px; border-radius: 10px; }
  .doll-slot { position: relative; display: flex; align-items: center; justify-content: center; font-size: 23px;
    line-height: 1; background: linear-gradient(#2a1f14, #231a11); border: 1px solid #6b4a2a; cursor: pointer;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.04), inset 0 -2px 3px rgba(0,0,0,.35);
    filter: drop-shadow(0 1px 1px rgba(0,0,0,.35)); transition: box-shadow .1s; }
  .doll-slot:hover:not(.doll-vacant) { box-shadow: inset 0 0 0 1px rgba(224,180,74,.55); }
  .doll-vacant { background: linear-gradient(#231a11, #1e160d); cursor: default; font-size: 8.5px;
    font-family: "Space Mono", monospace; font-weight: 700; letter-spacing: .4px; text-transform: uppercase;
    color: rgba(168,152,119,.55); box-shadow: inset 0 2px 4px rgba(0,0,0,.4); text-shadow: none; }
  .stat-summary { background: linear-gradient(#2a1f14, #231a11);
    border: 1px solid #3c2e1f; border-radius: 12px; padding: 10px; box-shadow: inset 0 1px 0 rgba(255,255,255,.04); }
  .stat-title { color: #e0b44a; font-family: "Fredoka", sans-serif; font-size: 12px; font-weight: 700; margin-bottom: 6px;
    letter-spacing: .3px; border-bottom: 1px solid #3c2e1f; padding-bottom: 5px; }
  .stat-row { display: flex; justify-content: space-between; font-size: 12px; padding: 2px 0;
    color: #ebdfc8; }
  .stat-row span:last-child { color: #9fb04e; font-weight: 700; }
  .stat-row.neg span:last-child { color: #c98a8a; }

  /* Combat */
  .hp-wrap { margin-bottom: 10px; }
  .hp-label { font-size: 12px; margin-bottom: 4px; color: var(--text); font-weight: 600; }
  .hpbar { height: 15px; background: var(--panel-lo); border-radius: 5px; overflow: hidden;
    border: 1px solid var(--bevel-lo); box-shadow: var(--sink); }
  .hpfill { height: 100%; background: linear-gradient(180deg,#e05a5a,#a02020);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.35); transition: width .25s ease; }
  .hpfill.hurt { animation: hpHurt .45s ease-out; }
  @keyframes hpHurt { 0% { filter: brightness(2.4) saturate(1.5); }
    100% { filter: none; } }
  .hpbar.low { animation: hpLow 1s ease-in-out infinite; }
  @keyframes hpLow { 0%, 100% { box-shadow: var(--sink); }
    50% { box-shadow: var(--sink), 0 0 9px 1px rgba(224,60,60,.75); } }
  .style-wrap { margin-bottom: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .style-wrap .stat-title { grid-column: 1 / -1; }
  .style-btn { padding: 7px; color: var(--text); border: 1px solid var(--bevel-lo);
    background: linear-gradient(180deg, var(--panel-hi), var(--panel2));
    border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: 600; box-shadow: var(--raise);
    transition: transform .08s, background .1s; }
  .style-btn:hover { background: linear-gradient(180deg, #47402f, var(--panel-hi)); }
  .style-btn:active { transform: translateY(1px); }
  .style-btn.active { color: #1a1710; font-weight: 700;
    background: linear-gradient(180deg, #f2d774, var(--gold-dk));
    box-shadow: inset 0 1px 0 rgba(255,255,255,.5), 0 0 8px rgba(232,198,90,.35);
    text-shadow: 0 1px 0 rgba(255,255,255,.3); }
  .target-info { font-size: 13px; }
  .target-info .tip-good, .target-info .tip-req { font-weight: 600; }
  /* Status colors usable outside the item tooltip (e.g. ammo line). */
  .tip-good { color: var(--accent); }
  .tip-req { color: #dd8a58; }

  /* Stations */
  .station-bar { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
  .station-btn { padding: 6px 9px; color: var(--muted); border: 1px solid var(--bevel-lo);
    background: linear-gradient(180deg, var(--panel-hi), var(--panel2));
    border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: 600; box-shadow: var(--raise);
    transition: color .1s, background .1s; }
  .station-btn:hover { color: var(--text); background: linear-gradient(180deg, #47402f, var(--panel-hi)); }
  .station-btn.active { color: #1a1710; font-weight: 700;
    background: linear-gradient(180deg, #f2d774, var(--gold-dk));
    box-shadow: inset 0 1px 0 rgba(255,255,255,.5); text-shadow: 0 1px 0 rgba(255,255,255,.3); }
  .recipe-row { display: flex; align-items: center; gap: 8px;
    background: linear-gradient(180deg, var(--panel2), var(--panel));
    border: 1px solid var(--bevel-lo); border-radius: 5px; padding: 5px 8px; margin-bottom: 4px;
    box-shadow: var(--raise); transition: box-shadow .1s; }
  .recipe-row:not(.locked):hover { box-shadow: var(--raise), 0 2px 6px rgba(0,0,0,.3); }
  .recipe-row.locked { opacity: 0.5; }
  .recipe-info { flex: 1; min-width: 0; }
  .recipe-name { font-size: 12px; color: var(--text); font-weight: 600; }
  .recipe-meta { font-size: 10px; color: var(--gold); }
  .recipe-inputs { font-size: 10px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; }
  .craft-btn { padding: 7px 12px; color: #0f1408; border: 1px solid var(--accent-dk);
    background: linear-gradient(180deg, #93d95f, var(--accent-dk));
    border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: 700; white-space: nowrap;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.4); text-shadow: 0 1px 0 rgba(255,255,255,.25);
    transition: transform .08s; }
  .craft-btn:not(:disabled):hover { background: linear-gradient(180deg, #a6e872, #558833); }
  .craft-btn:not(:disabled):active { transform: translateY(1px); }
  .craft-btn:disabled { background: var(--panel); color: var(--muted); cursor: default;
    border: 1px solid var(--bevel-lo); box-shadow: var(--sink); text-shadow: none; }

  /* Grand Exchange */
  .ge-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .ge-coins { color: var(--gold); font-weight: 700; font-size: 13px; }
  .ge-treasury { padding: 8px 10px; margin-bottom: 8px; font-size: 12px; color: var(--muted);
    background: linear-gradient(180deg, #2c2718, #201d12); border: 1px solid var(--bevel-lo);
    border-radius: 5px; box-shadow: var(--raise); }
  .ge-treasury-head { display: flex; justify-content: space-between; align-items: center; }
  .ge-treasury-bal { color: var(--gold); font-weight: 700; text-shadow: 0 1px 0 #000; }
  .ge-treasury-note { font-size: 10px; color: var(--muted); margin-top: 5px; opacity: .9; }
  .ge-hoard { position: relative; height: 14px; margin-top: 6px; background: var(--panel-lo);
    border-radius: 7px; box-shadow: var(--sink); overflow: hidden; }
  .ge-hoard-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 7px;
    background: linear-gradient(180deg, #f2d774, var(--gold-dk));
    box-shadow: inset 0 1px 0 rgba(255,255,255,.5); transition: width .4s ease; }
  .ge-hoard-dragon { position: absolute; right: 3px; top: 50%; transform: translateY(-50%);
    font-size: 12px; filter: drop-shadow(0 1px 1px #000); }
  /* Dragon raid alert */
  .ge-raid { padding: 10px; margin-bottom: 8px;
    background: linear-gradient(180deg, #3a1c14, #24120c); border: 1px solid #a8432a;
    border-radius: 6px; box-shadow: var(--raise), 0 0 16px rgba(200,70,40,.25);
    animation: luIn .4s ease-out both; }
  .ge-raid-title { color: #f0a24a; font-weight: 800; font-size: 14px; letter-spacing: .3px;
    text-shadow: 0 1px 0 #000, 0 0 10px rgba(240,120,50,.4);
    display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-display); }
  .ge-raid-title svg { width: 18px; height: 18px; }
  .ge-hoard-dragon svg { width: 12px; height: 12px; display: block; }
  .ge-raid-body { font-size: 11px; color: var(--text); margin: 5px 0 8px; line-height: 1.5; }
  .ge-raid-body b { color: var(--gold); }
  .ge-raid-btn { width: 100%; padding: 9px; border: 1px solid #6e2a18; border-radius: 5px;
    background: linear-gradient(180deg, #d9633a, #922f18); color: #fff2e6; font-weight: 700;
    font-size: 13px; cursor: pointer; box-shadow: inset 0 1px 0 rgba(255,255,255,.25);
    text-shadow: 0 1px 0 rgba(0,0,0,.4); transition: transform .08s; }
  .ge-raid-btn:hover { background: linear-gradient(180deg, #e87445, #a5351b); }
  .ge-raid-btn:active { transform: translateY(1px); }
  .ge-event { padding: 7px 10px; margin-bottom: 8px; font-size: 12px; color: var(--text);
    background: linear-gradient(180deg, #3a2a16, #241a0d); border: 1px solid var(--gold-dk);
    border-radius: 5px; box-shadow: var(--raise), 0 0 12px rgba(232,198,90,.15);
    animation: luIn .4s ease-out both; }
  .ge-event b { color: var(--gold); display: block; margin-bottom: 1px; text-shadow: 0 1px 0 #000; }
  .ge-depth { display: flex; align-items: center; gap: 8px; margin-top: 6px;
    font-size: 11px; color: var(--muted); }
  .ge-depth-bar { flex: 1; height: 6px; background: var(--panel-lo); border-radius: 3px;
    overflow: hidden; box-shadow: var(--sink); }
  .ge-depth-fill { height: 100%; border-radius: 3px; transition: width .3s ease; }
  .ge-supply-low { color: #d9635a; } .ge-depth-fill.ge-supply-low { background: linear-gradient(180deg,#e07a72,#b03b32); }
  .ge-supply-mid { color: var(--gold); } .ge-depth-fill.ge-supply-mid { background: linear-gradient(180deg,#f2d774,var(--gold-dk)); }
  .ge-supply-hi { color: var(--accent); } .ge-depth-fill.ge-supply-hi { background: linear-gradient(180deg,#9cd86a,var(--accent-dk)); }
  .ge-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .ge-chip { padding: 4px 7px; background: var(--panel2); color: var(--muted); border: 1px solid var(--border);
    border-radius: 4px; cursor: pointer; font-size: 10px; }
  .ge-chip:hover { color: var(--text); }
  .ge-chip.active { background: var(--gold); color: #1a1710; font-weight: 700; }
  .ge-market { background: linear-gradient(180deg, var(--panel2), var(--panel));
    border: 1px solid var(--bevel-lo); border-radius: 5px; padding: 10px; box-shadow: var(--raise); }
  .ge-item { font-size: 14px; font-weight: 700; color: var(--text); text-shadow: 0 1px 0 #000; }
  .ge-quote { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .ge-quote b { color: var(--gold); }
  .ge-chart { margin: 6px 0 2px; background: var(--panel-lo, #11100c); border-radius: 3px; padding: 2px; }
  .ge-gate { text-align: center; padding: 28px 18px; color: var(--muted); }
  .ge-gate-title { font-size: 16px; font-weight: 700; color: var(--gold); margin-bottom: 10px; }
  .ge-gate-body { font-size: 12px; line-height: 1.5; }
  .ge-gate-body b { color: var(--text); }
  .ge-form { display: flex; gap: 8px; margin: 8px 0 6px; }
  .ge-form label { font-size: 11px; color: var(--muted); flex: 1; }
  .ge-form input { width: 100%; background: var(--panel-lo); color: var(--text); border: 1px solid var(--bevel-lo);
    border-radius: 4px; padding: 5px; font-size: 12px; box-shadow: var(--sink); }
  .ge-form input:focus { outline: none; box-shadow: var(--sink), 0 0 0 1px var(--gold); }
  .ge-btns { display: flex; gap: 8px; }
  .ge-btn { flex: 1; padding: 8px; border: 1px solid var(--bevel-lo); border-radius: 5px; cursor: pointer;
    font-size: 13px; font-weight: 700; box-shadow: inset 0 1px 0 rgba(255,255,255,.3);
    text-shadow: 0 1px 0 rgba(0,0,0,.35); transition: transform .08s; }
  .ge-btn:active { transform: translateY(1px); }
  .ge-btn.buy { background: linear-gradient(180deg, #5a8bc4, #2f5680); color: #fff; }
  .ge-btn.sell { background: linear-gradient(180deg, #93d95f, var(--accent-dk)); color: #14130f; }
  .ge-offer { display: flex; align-items: center; gap: 6px; background: var(--panel2); border: 1px solid var(--border);
    border-left-width: 3px; border-radius: 4px; padding: 5px 7px; margin-bottom: 4px; }
  .ge-offer.buy { border-left-color: #3d6a9e; }
  .ge-offer.sell { border-left-color: var(--accent); }
  .ge-offer-info { flex: 1; min-width: 0; font-size: 11px; color: var(--text); }
  .ge-mini { padding: 3px 6px; background: var(--panel); color: var(--muted); border: 1px solid var(--border);
    border-radius: 3px; cursor: pointer; font-size: 10px; }
  .ge-mini:hover { color: var(--text); }

  /* Chat log */
  /* Chat console — AAA redesign: warm near-black, Space Mono log. */
  #chatlog { flex: 0 0 auto; height: clamp(58px, 13vh, 116px); overflow-y: auto; background: #1a140d;
    border-top: 1px solid #4a3927; box-shadow: inset 0 2px 6px rgba(0,0,0,.55);
    padding: 8px 14px; font-size: 12.5px; font-family: "Space Mono", "Consolas", monospace;
    color: #cdbf9e; line-height: 1.55; }
  .chat-line { padding: 1px 0; text-shadow: 0 1px 0 #000; }
  .chat-msg .chat-name { font-weight: 700; }
  .chat-msg .chat-text { color: #cdbf9e; }
  .chat-msg.chat-self .chat-text { color: #ebdfc8; }

  /* Chat input bar (RuneScape-style "press Enter to chat") */
  #chat-input-bar { flex: 0 0 auto; display: flex; background: #1a140d;
    border-top: 1px solid #4a3927; padding: 6px 10px; }
  #chat-input { flex: 1; background: #120d08; color: #ebdfc8;
    border: 1px solid #4a3927; border-radius: 10px; padding: 8px 11px;
    font-size: 13px; font-family: "Space Mono", "Consolas", monospace; box-shadow: inset 0 1px 3px rgba(0,0,0,.5); }
  #chat-input::placeholder { color: #7a6b4f; }
  #chat-input:focus { outline: none; border-color: #9fb04e; box-shadow: inset 0 1px 3px rgba(0,0,0,.5), 0 0 0 2px rgba(159,176,78,.25); }
  /* Chat minimize handle — mobile only (shown in the max-width:560 block). */
  #chat-toggle { display: none; }

  /* Item hover tooltip (OSRS-style card) */
  #item-tip { position: fixed; z-index: 10000; pointer-events: none; max-width: 250px;
    background: linear-gradient(180deg, #2c2718, #191710); border: 1px solid var(--gold-dk);
    border-radius: 5px; padding: 8px 10px; font-size: 11px; color: var(--text); line-height: 1.5;
    box-shadow: 0 8px 24px rgba(0,0,0,.7), var(--raise); }
  #item-tip[hidden] { display: none; }
  #item-tip .tip-name { color: var(--gold); font-weight: 700; font-size: 12.5px; margin-bottom: 4px;
    text-shadow: 0 1px 0 #000; }
  #item-tip .tip-dim { color: var(--muted); }
  #item-tip .tip-good { color: var(--accent); }
  #item-tip .tip-req { color: #dd8a58; }
  #item-tip .tip-value { color: var(--gold); margin-top: 4px; padding-top: 4px;
    border-top: 1px solid rgba(74,67,49,.6); }
  #item-tip .tip-hint { color: var(--muted); font-style: italic; margin-top: 4px; }

  /* Context menu */
  .ctx-menu { position: fixed; z-index: 9999; background: linear-gradient(180deg, var(--panel-hi), var(--panel2));
    border: 1px solid var(--gold-dk); border-radius: 5px; min-width: 148px;
    box-shadow: 0 6px 20px rgba(0,0,0,.65), var(--raise); overflow: hidden; padding: 3px; }
  .ctx-item { padding: 7px 12px; font-size: 13px; cursor: pointer; color: var(--text); border-radius: 3px; }
  .ctx-item:hover { background: linear-gradient(180deg, #f2d774, var(--gold-dk)); color: #1a1710;
    font-weight: 600; text-shadow: 0 1px 0 rgba(255,255,255,.3); }

  /* Progression flourishes (xp drops + level-up banner) */
  #fx-layer { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 7; }
  .xp-drop { position: absolute; top: 14px; left: 50%;
    display: flex; align-items: center; gap: 6px; padding: 4px 11px;
    background: rgba(12,11,8,.82); border: 1px solid var(--gold-dk); border-radius: 14px;
    font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap;
    text-shadow: 0 1px 2px #000; box-shadow: 0 2px 8px rgba(0,0,0,.5);
    animation: xpRise 1.5s ease-out forwards; }
  .xp-drop .xp-ico { width: 15px; height: 15px; display: inline-flex;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,.6)); }
  .xp-drop .xp-ico svg { width: 100%; height: 100%; display: block; }
  .xp-drop .xp-amt { color: var(--gold); font-family: var(--font-display); }
  .xp-drop .xp-skill { color: var(--muted); font-weight: 600; font-size: 11px; }
  @keyframes xpRise {
    0%   { opacity: 0; transform: translate(-50%, 8px); }
    15%  { opacity: 1; transform: translate(-50%, 0); }
    70%  { opacity: 1; transform: translate(-50%, -26px); }
    100% { opacity: 0; transform: translate(-50%, -46px); }
  }
  .levelup-banner { position: absolute; top: 38%; left: 50%;
    display: flex; align-items: center; gap: 14px; padding: 16px 26px;
    background: linear-gradient(180deg, #3a3018, #241d0e);
    border: 2px solid var(--gold); border-radius: 10px;
    box-shadow: 0 0 0 1px var(--bevel-lo), 0 10px 40px rgba(0,0,0,.7), 0 0 30px rgba(232,198,90,.35);
    animation: luIn .5s cubic-bezier(.2,1.4,.4,1) both; }
  .levelup-banner.out { animation: luOut .5s ease-in forwards; }
  .levelup-banner .lu-icon { width: 44px; height: 44px; font-size: 40px; line-height: 1;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,.6)); animation: luSpin .6s cubic-bezier(.2,1.4,.4,1) both; }
  .levelup-banner .lu-icon svg { width: 100%; height: 100%; display: block; }
  @keyframes luSpin { 0% { transform: scale(.3) rotate(-30deg); } 100% { transform: none; } }
  .levelup-banner .lu-text { display: flex; flex-direction: column; }
  .levelup-banner .lu-text b { color: var(--gold); font-size: 21px; letter-spacing: .5px;
    font-family: var(--font-display);
    text-shadow: 0 2px 0 #000, 0 0 12px rgba(232,198,90,.5); }
  .levelup-banner .lu-text span { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .quest-banner .lu-text b { color: var(--accent); }

  /* Quest Journal */
  .quest-header { display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 10px; }
  .quest-header .qh-title { font-size: 15px; font-weight: 700; color: var(--gold);
    text-shadow: 0 1px 0 #000; font-family: var(--font-display);
    display: inline-flex; align-items: center; gap: 6px; }
  .quest-header .qh-title svg { width: 17px; height: 17px; }
  .quest-header .qh-count { font-size: 11px; color: var(--muted); }
  .quest-section-label { margin: 12px 0 6px; font-size: 10px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); }
  .quest-card { padding: 9px 10px; margin-bottom: 8px; border-radius: 6px;
    background: linear-gradient(180deg, var(--panel2), var(--panel));
    border: 1px solid var(--bevel-lo); box-shadow: var(--raise); }
  .quest-card.quest-done { opacity: .7; }
  .quest-head { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
  .quest-name { font-weight: 700; font-size: 13px; color: var(--text); }
  /* [a11y] subtle "read aloud" button — sits by the name, badge stays right */
  .quest-tts { margin-right: auto; padding: 2px; background: none; border: 0;
    cursor: pointer; opacity: .4; line-height: 0; border-radius: 4px;
    transition: opacity .12s, background .12s; }
  .quest-tts:hover { opacity: 1; background: rgba(255,255,255,.08); }
  .quest-tts.speaking { opacity: 1; }
  .quest-tts svg { width: 15px; height: 15px; display: block; }
  .quest-badge { font-size: 9px; text-transform: uppercase; letter-spacing: .5px;
    padding: 2px 6px; border-radius: 4px; white-space: nowrap;
    background: var(--panel-lo); color: var(--muted); border: 1px solid var(--bevel-lo); }
  .quest-badge.q-active { color: var(--gold); border-color: var(--gold-dk); }
  .quest-badge.q-complete { color: var(--accent); border-color: var(--accent-dk); }
  .quest-giver { font-size: 10px; color: var(--accent); margin-top: 1px; opacity: .85; }
  .quest-summary { font-size: 11px; color: var(--muted); margin: 5px 0 6px; line-height: 1.35; }
  .quest-steps { display: flex; flex-direction: column; gap: 4px; margin: 6px 0; }
  .quest-step { display: grid; grid-template-columns: 14px 1fr auto; align-items: center;
    gap: 6px; font-size: 11px; color: var(--text); }
  .quest-step .qs-check { color: var(--muted); text-align: center; }
  .quest-step.qs-done .qs-check { color: var(--accent); }
  .quest-step.qs-done .qs-text { color: var(--muted); text-decoration: line-through; }
  .quest-step .qs-count { font-size: 10px; color: var(--gold); font-weight: 700; }
  .quest-step .qs-bar { grid-column: 2 / 4; height: 4px; background: var(--panel-lo);
    border-radius: 3px; overflow: hidden; box-shadow: var(--sink); }
  .quest-step .qs-fill { display: block; height: 100%;
    background: linear-gradient(180deg,#9cd86a,#5a8f3d); }
  .quest-reward { margin-top: 6px; font-size: 10.5px; color: var(--gold); }
  .quest-start { margin-top: 8px; width: 100%; padding: 6px; cursor: pointer;
    font-weight: 700; font-size: 12px; border-radius: 5px; color: #fff;
    background: var(--accent-dk); border: 1px solid var(--accent); }
  .quest-start:hover { background: var(--accent); }
  .quest-empty { font-size: 11px; color: var(--muted); font-style: italic; padding: 4px 0; }
  /* v2 quest journal: active highlight, current step, directions, giver-start */
  .quest-card.quest-active { border-color: var(--gold-dk); box-shadow: var(--raise), 0 0 0 1px rgba(232,198,90,.25); }
  .quest-step.qs-current { color: var(--gold); font-weight: 700; }
  .quest-step.qs-current .qs-check { color: var(--gold); }
  .quest-step.qs-todo { color: var(--muted); opacity: .8; }
  .quest-step.qs-todo .qs-check { color: var(--muted); }
  .quest-directions { margin: 6px 0; padding: 6px 8px; font-size: 11px; font-style: italic;
    color: var(--text); background: rgba(232,198,90,.08); border-left: 2px solid var(--gold-dk);
    border-radius: 0 4px 4px 0; line-height: 1.4; }
  .quest-starthint { margin-top: 6px; font-size: 11px; color: var(--accent); line-height: 1.4; }
  .quest-starthint b { color: var(--gold); }
  .quest-track { margin-top: 8px; padding: 5px 12px; cursor: pointer; font-size: 11px;
    font-weight: 700; border-radius: 5px; color: var(--muted);
    background: var(--panel-lo); border: 1px solid var(--bevel-lo); }
  .quest-track:hover { color: var(--text); border-color: var(--accent); }
  .quest-track.on { color: #1a1710; background: linear-gradient(180deg, #f2d774, var(--gold-dk));
    border-color: var(--gold); }
  .quest-card.quest-tracked { box-shadow: var(--raise), -3px 0 0 var(--gold) inset; }

  /* Quest-giver speech box over the game view */
  #dialogue-box { position: absolute; left: 50%; bottom: 18px; transform: translateX(-50%);
    z-index: 40; width: min(560px, 82%); padding: 12px 16px 8px; cursor: pointer;
    background: linear-gradient(180deg, rgba(40,36,26,.97), rgba(28,25,18,.97));
    border: 1px solid var(--gold-dk); border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,.6), var(--raise); color: var(--text);
    font-size: 13.5px; line-height: 1.45; animation: dlgIn .18s ease-out; }
  #dialogue-box[hidden] { display: none; }
  #dialogue-box .dlg-speaker { font-weight: 800; color: var(--accent); font-size: 13px;
    letter-spacing: .3px; margin-bottom: 4px; text-shadow: 0 1px 0 #000; }
  #dialogue-box .dlg-line { margin: 2px 0; }
  #dialogue-box .dlg-dismiss { margin-top: 6px; text-align: right; font-size: 10px;
    color: var(--muted); }
  @keyframes dlgIn { 0% { opacity: 0; transform: translate(-50%, 8px); }
    100% { opacity: 1; transform: translate(-50%, 0); } }

  /* ---- Cutscenes: letterboxed cinematic beats over the game view ---- */
  #cutscene { position: absolute; inset: 0; z-index: 60; pointer-events: auto;
    cursor: pointer; opacity: 0; transition: opacity .35s ease; }
  #cutscene[hidden] { display: none; }
  #cutscene.on { opacity: 1; }
  #cutscene .cs-fade { position: absolute; inset: 0; background: #000; opacity: 0;
    transition: opacity .8s ease; pointer-events: none; }
  #cutscene .cs-fade.black { opacity: 1; }
  #cutscene .cs-bar { position: absolute; left: 0; right: 0; height: 14%; background: #000;
    box-shadow: 0 0 24px rgba(0,0,0,.9); }
  #cutscene .cs-bar-top { top: 0; }
  #cutscene .cs-bar-bottom { bottom: 0; }
  #cutscene .cs-stage { position: absolute; inset: 14% 0; display: flex;
    flex-direction: column; align-items: center; justify-content: center; gap: 18px;
    padding: 0 8%; text-align: center; }
  #cutscene .cs-title { opacity: 0; transform: translateY(10px); transition: opacity .5s, transform .5s; }
  #cutscene .cs-title.show { opacity: 1; transform: none; }
  #cutscene .cs-title-main { font-size: 40px; font-weight: 800; letter-spacing: 1px;
    color: var(--gold); text-shadow: 0 3px 0 #000, 0 0 22px rgba(232,198,90,.4);
    font-family: Georgia, "Times New Roman", serif; }
  #cutscene .cs-title-sub { margin-top: 8px; font-size: 15px; letter-spacing: 4px;
    text-transform: uppercase; color: var(--muted); }
  #cutscene .cs-caption { max-width: 720px; opacity: 0; transform: translateY(8px);
    transition: opacity .4s, transform .4s; }
  #cutscene .cs-caption.show { opacity: 1; transform: none; }
  #cutscene .cs-who { display: block; font-size: 15px; font-weight: 800; letter-spacing: .5px;
    color: var(--accent); margin-bottom: 6px; text-shadow: 0 1px 0 #000; }
  #cutscene .cs-say { font-size: 21px; line-height: 1.4; color: #f4eeda;
    text-shadow: 0 2px 6px #000; font-family: Georgia, serif; }
  #cutscene .cs-skip { position: absolute; right: 14px; bottom: calc(14% + 10px);
    font-size: 11px; color: rgba(255,255,255,.55); letter-spacing: .5px; }
  #cutscene.cs-shake { animation: csShake .5s ease; }
  @keyframes csShake { 0%,100%{transform:translate(0,0)} 20%{transform:translate(-6px,3px)}
    40%{transform:translate(6px,-3px)} 60%{transform:translate(-4px,-2px)} 80%{transform:translate(4px,2px)} }

  @keyframes luIn { 0% { opacity: 0; transform: translate(-50%,-50%) scale(.6); }
    100% { opacity: 1; transform: translate(-50%,-50%) scale(1); } }
  @keyframes luOut { 0% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-64%) scale(.95); } }

  /* World map button + overlay */
  #map-btn { position: absolute; top: 190px; right: 12px; z-index: 6;
    width: 42px; height: 42px; padding: 0; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; line-height: 1;
    color: var(--gold); border: 1px solid var(--gold-dk);
    background: linear-gradient(180deg, var(--panel-hi), var(--panel2)); cursor: pointer;
    box-shadow: var(--raise), 0 2px 6px rgba(0,0,0,.4);
    transition: transform .08s, color .1s, background .1s; }
  #map-btn svg { width: 23px; height: 23px; filter: drop-shadow(0 1px 1px rgba(0,0,0,.5)); }
  #map-btn:hover { background: linear-gradient(180deg, #4a4331, var(--panel-hi)); }
  #map-btn:hover svg { filter: drop-shadow(0 1px 1px rgba(0,0,0,.5)) drop-shadow(0 0 5px rgba(232,198,90,.5)); }
  #map-btn:active { transform: translateY(1px); }
  #cam-hint { position: absolute; top: 190px; right: 112px; z-index: 6;
    width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 18px; font-weight: 700; color: var(--muted); cursor: help;
    background: linear-gradient(180deg, var(--panel-hi), var(--panel2));
    border: 1px solid var(--border); box-shadow: var(--raise), 0 2px 6px rgba(0,0,0,.4); }
  #cam-hint:hover { color: var(--gold); }
  #cam-hint .ch-pop { position: absolute; top: 48px; right: 0; width: 184px; padding: 7px 9px;
    background: rgba(20,18,14,.94); border: 1px solid var(--border); border-radius: 5px;
    color: #b9b096; font-size: 10px; font-weight: 400; line-height: 1.5; text-align: left;
    box-shadow: 0 5px 14px rgba(0,0,0,.5); display: none; z-index: 10; }
  #cam-hint:hover .ch-pop { display: block; }
  #cam-hint .ch-pop b { color: var(--gold); font-weight: 700; }
  /* Run toggle + energy bar */
  #run-btn { position: absolute; top: 190px; right: 62px; z-index: 6; --run-pct: 100; --ring: var(--gold);
    width: 42px; height: 42px; padding: 0; border: none; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text);
    background: conic-gradient(var(--ring) calc(var(--run-pct) * 1%), var(--panel-lo) 0);
    box-shadow: 0 2px 6px rgba(0,0,0,.4); transition: transform .08s; }
  #run-btn::before { content: ''; position: absolute; inset: 3px; border-radius: 50%;
    background: linear-gradient(180deg, var(--panel-hi), var(--panel2)); box-shadow: var(--sink); }
  #run-btn:active { transform: translateY(1px); }
  #run-btn.on { --ring: var(--accent); color: var(--accent); }
  #run-btn.low { --ring: #c0553a; color: #e88a6a; }
  #run-ico { position: relative; z-index: 1; width: 21px; height: 21px; line-height: 1;
    display: inline-flex; filter: drop-shadow(0 1px 1px rgba(0,0,0,.5)); }
  #run-ico svg { width: 100%; height: 100%; }
  #run-btn.on #run-ico { filter: drop-shadow(0 1px 1px rgba(0,0,0,.5)) drop-shadow(0 0 5px rgba(123,191,74,.55)); }
  #run-pct, #run-bar { display: none; }
  /* Home Teleport button — a progress ring like the run toggle (fills while
     channelling, depletes while on cooldown). Sits below the button row. */
  #home-btn { position: absolute; top: 240px; right: 12px; z-index: 6; --home-pct: 100; --ring: var(--gold);
    width: 42px; height: 42px; padding: 0; border: none; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--gold);
    background: conic-gradient(var(--ring) calc(var(--home-pct) * 1%), var(--panel-lo) 0);
    box-shadow: 0 2px 6px rgba(0,0,0,.4); transition: transform .08s; }
  #home-btn::before { content: ''; position: absolute; inset: 3px; border-radius: 50%;
    background: linear-gradient(180deg, var(--panel-hi), var(--panel2)); box-shadow: var(--sink); }
  #home-btn:hover { color: #f2d774; }
  #home-btn:active { transform: translateY(1px); }
  #home-btn.channeling { --ring: var(--accent); color: var(--accent);
    animation: homePulse .9s ease-in-out infinite; }
  #home-btn.cooldown { --ring: #7a5a3a; color: var(--muted); cursor: default; }
  #home-ico { position: relative; z-index: 1; width: 21px; height: 21px; line-height: 1;
    display: inline-flex; filter: drop-shadow(0 1px 1px rgba(0,0,0,.5)); }
  #home-ico svg { width: 100%; height: 100%; }
  #home-btn.channeling #home-ico { filter: drop-shadow(0 1px 1px rgba(0,0,0,.5)) drop-shadow(0 0 5px rgba(123,191,74,.55)); }
  #home-state { position: absolute; bottom: 1px; z-index: 1; font-size: 9px; font-weight: 700;
    color: var(--gold); text-shadow: 0 1px 0 #000, 0 0 2px #000; }
  @keyframes homePulse { 0%,100% { box-shadow: 0 2px 6px rgba(0,0,0,.4); }
    50% { box-shadow: 0 0 10px 2px rgba(123,191,74,.55); } }
  #worldmap-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.72); z-index: 9998;
    display: flex; align-items: center; justify-content: center; }
  #worldmap-overlay[hidden] { display: none; }
  .wm-box { background: var(--panel); border: 2px solid var(--gold); border-radius: 6px; padding: 12px;
    max-width: 96vw; max-height: 96vh; }
  .wm-head { display: flex; justify-content: space-between; align-items: center; color: var(--gold);
    font-weight: 700; margin-bottom: 8px; }
  #wm-close { background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 4px; cursor: pointer; padding: 2px 12px; font-size: 14px; }
  #wm-close:hover { background: #5a2020; }
  #worldmap-canvas { display: block; background: #0c0c0a; border: 1px solid var(--border);
    cursor: crosshair; max-width: 88vh; max-height: 88vh; }
  .wm-hint { color: var(--muted); font-size: 11px; margin-top: 6px; text-align: center; }
  .wm-dot { display: inline-block; width: 8px; height: 8px; border-radius: 2px;
    vertical-align: baseline; box-shadow: 0 0 3px rgba(0,0,0,.6); }

  /* ============================================================
     MOBILE — portrait phones (≤720px wide): stack the game over the
     panel, shrink chrome, finger-size the controls, fit overlays.
     Tablets/desktop keep the side-by-side layout.
     ============================================================ */
  @media (max-width: 560px) {
    /* Stack: game on top, tabbed panel below, chat at the bottom. */
    #main { flex-direction: column; }
    #game-panel { flex: 6 1 0; min-height: 180px; }
    #side-panel { flex: 5 1 0; min-width: 0; max-width: none; width: 100%;
      border-left: none; border-top: 2px solid var(--bevel-lo);
      box-shadow: inset 0 1px 0 var(--bevel-hi); }

    /* Top bar: scroll horizontally instead of overflowing; hide dev tick;
       respect the notch. */
    #topbar { gap: 9px; padding: 6px calc(8px + env(safe-area-inset-left));
      overflow-x: auto; overflow-y: hidden; white-space: nowrap; }
    #topbar::-webkit-scrollbar { display: none; }
    #topbar > * { flex: 0 0 auto; } /* keep width so the bar scrolls, not squishes */
    #topbar #tb-name { font-size: 15px; }
    #tb-tick { display: none; }

    /* Bigger tab hit-targets for thumbs. */
    .tab-btn { padding: 9px 2px 7px; }
    .tab-btn .tab-icon { font-size: 18px; }
    .tab-btn .tab-label { font-size: 10px; }

    /* Canvas HUD controls: keyboard hints are useless on touch. The minimap owns
       the top-right and the quest toast the top-left, so cluster the action
       buttons as one thumb-friendly row along the game view's BOTTOM-LEFT edge —
       out of the minimap, off the toast, and no longer floating over the world
       (home-btn had no mobile rule and was landing mid-screen). */
    #cam-hint { display: none; }
    #map-btn, #run-btn, #home-btn { top: auto; bottom: 8px; }
    #run-btn  { left: 8px;   right: auto; }
    #home-btn { left: 58px;  right: auto; }
    #map-btn  { left: 108px; right: auto; }

    /* Chat: a touch shorter; input big enough that iOS won't zoom on focus. */
    #chatlog { flex-basis: 84px; height: 84px; padding: 6px 12px; }
    #chat-input-bar { padding: 5px 10px calc(5px + env(safe-area-inset-bottom)); gap: 6px; }
    #chat-input { font-size: 16px; padding: 9px 10px; }
    .ge-form input { font-size: 16px; }

    /* Minimizable chat: tap the handle to collapse the log to nothing and hand
       its height back to the game view; the input bar stays put. */
    #chat-toggle { display: inline-flex; align-items: center; justify-content: center;
      flex: 0 0 auto; width: 40px; height: 40px; padding: 0; color: var(--muted);
      background: var(--panel-lo); border: 1px solid var(--bevel-lo); border-radius: 4px; }
    #chat-toggle .chev { display: inline-flex; transition: transform .15s ease; }
    #chat-toggle svg { display: block; width: 18px; height: 18px; }
    #app.chat-collapsed #chat-toggle .chev { transform: rotate(180deg); }
    #app.chat-collapsed #chatlog { display: none; }

    /* Comfortable tap sizes for the common action buttons. */
    .style-btn, .station-btn, .craft-btn, .ge-btn, .ge-chip, .ge-mini,
    .modal-close, .tab-btn { min-height: 40px; }
    .craft-btn, .ge-btn { padding: 10px 12px; }

    /* Overlays fit the dynamic viewport and never exceed screen width. */
    .modal-panel { width: min(440px, 94vw); max-height: 86dvh; }
    .wm-box { max-height: 94dvh; padding: 10px; }
    #worldmap-canvas { max-width: min(88vh, 92vw); max-height: 76dvh; }

    /* Hover tooltips don't exist on touch — keep them from lingering huge. */
    #item-tip { max-width: 70vw; }
  }

  /* Landscape phones (short height): trim the fixed bars so the game/panel
     still get room; keep the side-by-side layout, which reads well wide. */
  @media (max-height: 500px) and (min-width: 561px) {
    #topbar { padding: 4px 12px; }
    #topbar .tb-avatar { width: 28px; height: 28px; }
    #chatlog { flex-basis: 62px; height: 62px; }
  }

  /* Coarse pointer (touch) anywhere: remove hover-only affordances that can
     stick on tap, and make selectable slots easy to hit. */
  @media (hover: none) and (pointer: coarse) {
    .skill-cell:hover { transform: none; box-shadow: var(--raise); }
    .inv-slot, .doll-slot { min-height: 44px; }
    /* Stop the long-press text-selection callout from fighting our menu. */
    .inv-slot, .doll-slot, .tab-btn, .ctx-item, button, #chatlog, #topbar {
      -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    #chat-input { -webkit-user-select: text; user-select: text; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="tb-id">
      <div class="tb-avatar"><img src="assets/ui/goblin_hero.png" alt=""></div>
      <div>
        <div id="tb-name">Gork</div>
        <div class="tb-combat"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.6 2.5l-8 8 1 1 8-8V2.5h-1zM3 14l3 3-2 2 1.4 1.4 2-2 3 3 1-1-2.4-2.4 3-3-3.6-3.6-3 3L5 12 3 14z"/></svg><b id="tb-combat">Combat Lv 3</b></div>
      </div>
    </div>
    <div class="tb-div"></div>
    <span class="tb"><span class="tb-ico"><svg viewBox="0 0 24 24"><path d="M12 2 C7.5 2 4.5 5.4 4.5 9.4 C4.5 14.4 12 22 12 22 S19.5 14.4 19.5 9.4 C19.5 5.4 16.5 2 12 2 Z" fill="#e0655c"/><path d="M12 2 C7.5 2 4.5 5.4 4.5 9.4 C4.5 14.4 12 22 12 22 L12 2 Z" fill="#a03028"/><circle cx="12" cy="9.2" r="3" fill="#efe8d4"/></svg></span><span id="tb-location">Goblin Settlement</span></span>
    <span class="tb tb-gp"><span class="tb-ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9.5" fill="#c49b3a"/><circle cx="12" cy="12" r="7.6" fill="#f2d774"/><polygon points="7,9 12,5.4 13.8,7.8 8.6,11.4" fill="#fbeeb8" opacity=".9"/></svg></span><b id="tb-gp">0</b> gp</span>
    <span class="tb" id="tb-tick">Tick 0</span>
    <span class="tb" id="tb-fps" title="Render FPS · NPC count (perf probe)">–</span>
  </div>
  <div id="main">
    <div id="game-panel">
      <div id="game-canvas"></div>
      <button id="map-btn" title="World map (M)"><svg viewBox="0 0 24 24"><polygon points="3,5 9,3 9,19 3,21" fill="#d8ecc0"/><polygon points="9,3 15,5 15,21 9,19" fill="#c2dba6"/><polygon points="15,5 21,3 21,19 15,21" fill="#d8ecc0"/><path d="M5.5 16 Q9 12 12 12 T18.5 7" fill="none" stroke="#a03028" stroke-width="1.4" stroke-dasharray="2.2 1.6"/><circle cx="18.5" cy="7" r="1.5" fill="#e0655c"/></svg></button>
      <div id="cam-hint" title="Controls">
        <span class="ch-ico">?</span>
        <div class="ch-pop">
          <b>click minimap</b> to travel<br>
          <b>scroll</b> / <b>↑ ↓</b> zoom · <b>← →</b> rotate · <b>0</b> reset
        </div>
      </div>
      <button id="run-btn" title="Toggle run / walk (R)">
        <span id="run-ico"><svg viewBox="0 0 24 24"><polygon points="7,3 12,3 12,13 18,15 18,19 12,19 7,17" fill="#8a5a2e"/><polygon points="7,3 9.5,3 9.5,17 7,17" fill="#5f3c1c"/><rect x="6" y="18" width="13" height="3" rx="1.4" fill="#5f3c1c"/><line x1="2" y1="8" x2="5.4" y2="8" stroke="#efe8d4" stroke-width="1.6"/><line x1="1" y1="11.5" x2="4.6" y2="11.5" stroke="#efe8d4" stroke-width="1.6"/><line x1="2" y1="15" x2="4.4" y2="15" stroke="#efe8d4" stroke-width="1.6"/></svg></span><span id="run-pct">100%</span>
        <span id="run-bar"><span id="run-fill"></span></span>
      </button>
      <button id="home-btn" title="Home Teleport — channel ~10s to return to the settlement (free)">
        <span id="home-ico"><svg viewBox="0 0 24 24"><polygon points="12,2 22,11 19,11 19,21 5,21 5,11 2,11" fill="#8a5a2e"/><polygon points="12,2 2,11 5,11 12,4.8" fill="#5f3c1c"/><polygon points="12,2 22,11 19,11 12,4.8" fill="#9a693a"/><rect x="9.6" y="13" width="4.8" height="8" rx="1" fill="#5f3c1c"/><circle cx="13.2" cy="17" r=".9" fill="#f2d774"/></svg></span><span id="home-state"></span>
      </button>
    </div>
    <div id="side-panel">
      <div id="tabbar"></div>
      <div id="panel-content"></div>
    </div>
  </div>
  <div id="chatlog"></div>
</div>
<div id="worldmap-overlay" hidden>
  <div class="wm-box">
    <div class="wm-head">
      <span>World Map — Goblin Empire</span>
      <button id="wm-close" title="Close (Esc)">✕</button>
    </div>
    <canvas id="worldmap-canvas" width="720" height="720"></canvas>
    <div class="wm-hint"><span class="wm-dot" style="background:#efe8d4"></span> you · <span class="wm-dot" style="background:#e8c65a"></span> landmarks · <span class="wm-dot" style="background:#e0655c"></span> enemies nearby — click anywhere to set a walk route</div>
  </div>
</div>
<script type="module" src="src/main.js"></script>
</body>
</html>
