<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Gork Scape 3D preview</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#0e1512;font-family:monospace}
#fps{position:fixed;top:8px;left:10px;color:#9fe08a;font-size:14px;z-index:9;text-shadow:0 1px 2px #000}
#hint{position:fixed;bottom:8px;left:10px;color:#cfe;font-size:12px;opacity:.6;z-index:9}</style>
<script type="importmap">{"imports":{
"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
"three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
</head><body>
<div id="fps">…</div><div id="hint">Gork Scape · 3D terrain preview — one finger to orbit · two fingers / scroll to zoom</div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const q = new URLSearchParams(location.search);
const region = await fetch('./region.json').then(r=>r.json());
const { w, h, terr, el, colors, spawn } = region;

// --- smooth the heightmap (kills the authored 1-tile cliffs -> clay hills) ---
let E = el.slice();
for (let p=0;p<1;p++){ const N=E.slice();
  for (let j=0;j<h;j++) for (let i=0;i<w;i++){ let s=0,n=0;
    for (let dj=-1;dj<=1;dj++) for (let di=-1;di<=1;di++){ const x=i+di,y=j+dj; if(x<0||y<0||x>=w||y>=h)continue; s+=E[y*w+x]; n++; }
    N[j*w+i]=s/n; } E=N; }

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight); renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.35; document.body.appendChild(renderer.domElement);
const scene = new THREE.Scene();
scene.background = new THREE.Color('#bcd8e8');
scene.fog = new THREE.Fog('#a9c7d6', 160, 340);

// --- bake the game's REAL 2D ground texture (same detail* logic as main.js) and
//     drape it over the low-poly mesh: faceted geometry + the hand-made texture ---
const TSPX = 16, S = TSPX/32;                       // px/tile in the baked atlas (176*16 = 2816)
const cv = document.createElement('canvas'); cv.width = w*TSPX; cv.height = h*TSPX;
const g2 = cv.getContext('2d');
const hexInt = s => parseInt(String(s).slice(1),16);
const shade = (ci,f)=>{ const r=(ci>>16)&255,gg=(ci>>8)&255,b=ci&255; return 'rgb('+(Math.min(255,r*f)|0)+','+(Math.min(255,gg*f)|0)+','+(Math.min(255,b*f)|0)+')'; };
const tHash=(x,y)=>{ let hh=(Math.imul(x,374761393)+Math.imul(y,668265263))^0x9e3779b9; hh=Math.imul(hh^(hh>>>13),1274126177); return ((hh^(hh>>>16))>>>0)/4294967295; };
const rc=(x,y,ww,hh)=>g2.fillRect(x,y,Math.max(1,ww),Math.max(1,hh));
const GRASS=new Set([0,11,12,19]), PATH=new Set([3,6,7,20]), WATER=new Set([1,13,14]), FIELD=new Set([8]);
for(let j=0;j<h;j++)for(let i=0;i<w;i++){
  const id=terr[j*w+i], hex=colors[id]||'#4a7c3a', ci=hexInt(hex), px=i*TSPX, py=j*TSPX;
  g2.globalAlpha=1; g2.fillStyle=hex; rc(px,py,TSPX+1,TSPX+1);
  if(GRASS.has(id)){ const r=tHash(i,j);
    g2.globalAlpha=0.42; g2.fillStyle=shade(ci, r<0.5?0.86:1.14); rc(px+((r*27*S)|0), py+(((r*271)%27*S)|0), 3.4*S,3.4*S);
    if(r>0.66){ g2.globalAlpha=0.38; g2.fillStyle=shade(ci,1.2); rc(px+(((r*431)%29)*S|0), py+(((r*733)%26)*S|0), 1.4*S,4.4*S); }
  } else if(PATH.has(id)){ for(let k=0;k<3;k++){ const r=tHash(i*5+k*31, j*7+k*17);
    g2.globalAlpha=0.5; g2.fillStyle=shade(ci, r<0.5?0.8:1.14); rc(px+(3+(r*24|0))*S, py+(3+((r*613)%24))*S, 3.4*S,3.4*S); }
  } else if(WATER.has(id)){ g2.globalAlpha=0.28; g2.fillStyle=shade(ci,1.4); rc(px+3*S, py+13*S, 26*S, 1.8*S);
  } else if(FIELD.has(id)){ g2.globalAlpha=0.7; g2.fillStyle=shade(ci,0.8); for(let fy=4;fy<31;fy+=6) rc(px, py+fy*S, TSPX+1, 1.3*S);
  } else if(id===9){ g2.globalAlpha=0.28; g2.fillStyle=shade(ci,1.08); rc(px+2*S,py+2*S,28*S,28*S);
    g2.globalAlpha=0.6; g2.fillStyle=shade(ci,0.72); rc(px,py,TSPX+1,1.3*S); rc(px,py,1.3*S,TSPX+1);
  } else if(id===10){ g2.globalAlpha=1; g2.fillStyle=shade(ci,0.62); rc(px,py,TSPX+1,TSPX+1);
    g2.globalAlpha=0.85; g2.fillStyle=shade(ci,1.15); rc(px+2*S,py+2*S,28*S,28*S); }
}
g2.globalAlpha=1;
const groundTex=new THREE.CanvasTexture(cv); groundTex.colorSpace=THREE.SRGBColorSpace; groundTex.flipY=false;
groundTex.anisotropy=renderer.capabilities.getMaxAnisotropy();

// --- terrain mesh: smoothed heightmap, real ground texture, low-poly facets ---
const HEIGHT = 13;
const pos=[], uv=[], idx=[];
for (let j=0;j<h;j++) for (let i=0;i<w;i++){
  pos.push(i-w/2, (E[j*w+i]/255)*HEIGHT, j-h/2);
  uv.push(i/(w-1), j/(h-1));
}
for (let j=0;j<h-1;j++) for (let i=0;i<w-1;i++){ const a=j*w+i,b=a+1,d=(j+1)*w+i,e=d+1; idx.push(a,d,b,b,d,e); }
const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
geo.setAttribute('uv', new THREE.Float32BufferAttribute(uv,2));
geo.setIndex(idx); geo.computeVertexNormals();
scene.add(new THREE.Mesh(geo, new THREE.MeshLambertMaterial({map:groundTex, flatShading:true})));

// --- one world-fixed key light (clay top-left) + soft fill ---
const sun = new THREE.DirectionalLight(0xfff4e0, 2.1); sun.position.set(-70,120,-30); scene.add(sun);
scene.add(new THREE.HemisphereLight(0xdcecff, 0x54633a, 1.05)); scene.add(new THREE.AmbientLight(0xffffff, 0.35));

// --- placeholder props: cone "trees" on grass + a capsule goblin at spawn ---
const heightAt=(tx,ty)=>{ tx=Math.max(0,Math.min(w-1,tx|0)); ty=Math.max(0,Math.min(h-1,ty|0)); return (E[ty*w+tx]/255)*HEIGHT; };
const trunkMat=new THREE.MeshLambertMaterial({color:0x6b4a2a}), leafMat=new THREE.MeshLambertMaterial({color:0x4e8a2e});
let seed=1; const rnd=()=>{ seed=(seed*16807)%2147483647; return seed/2147483647; };
for (let n=0;n<40;n++){ const i=(rnd()*w)|0,j=(rnd()*h)|0; const id=terr[j*w+i]; if(id!==0&&id!==7&&id!==9)continue;
  const x=i-w/2,z=j-h/2,y=heightAt(i,j);
  const t=new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.5,2.4,6),trunkMat); t.position.set(x,y+1.2,z); scene.add(t);
  const l=new THREE.Mesh(new THREE.ConeGeometry(2.1,4,8),leafMat); l.position.set(x,y+4,z); scene.add(l); }
// (goblin character is being rebuilt from your reference via image-to-3D — omitted here so this preview is purely the terrain look)

// --- camera + orbit (screenshot-controllable via ?az=&pol=&r=) ---
const camera=new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.5, 2000);
const controls=new OrbitControls(camera, renderer.domElement);
controls.target.set(0, HEIGHT*0.25, 0); controls.enableDamping=true; controls.maxPolarAngle=1.45;
const az=(+q.get('az')||35)*Math.PI/180, pol=(+q.get('pol')||58)*Math.PI/180, R=+q.get('r')||150;
camera.position.set(Math.sin(az)*Math.sin(pol)*R, Math.cos(pol)*R, Math.cos(az)*Math.sin(pol)*R);
if(q.get('gob')){ const gx=spawn.x-w/2,gz=spawn.y-h/2,gy=heightAt(spawn.x,spawn.y); controls.target.set(gx,gy+3,gz);
  const rr=+q.get('r')||30; camera.position.set(gx+Math.sin(az)*rr, gy+rr*0.6, gz+Math.cos(az)*rr); }
controls.update();

addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
let last=performance.now(), frames=0, fpsEl=document.getElementById('fps');
renderer.setAnimationLoop(()=>{ controls.update(); renderer.render(scene,camera);
  frames++; const t=performance.now(); if(t-last>=500){ fpsEl.textContent=Math.round(frames*1000/(t-last))+' fps · '+w+'×'+h+' tiles'; frames=0; last=t; } });
</script></body></html>
