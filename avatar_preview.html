<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Goblin Empire — Avatar Rig Preview</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<style>
  :root{ --bg:#14130f; --panel:#221f17; --border:#443f2e; --text:#e9e2cf; --gold:#e3c45a; --accent:#7bbf4a; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--text); font-family:"Segoe UI",Tahoma,sans-serif; }
  #wrap{ display:flex; height:100vh; }
  #stage{ flex:1; min-width:0; position:relative; }
  #panel{ width:230px; flex:0 0 230px; background:var(--panel); border-left:2px solid var(--border);
    padding:12px; overflow-y:auto; }
  h1{ font-size:14px; color:var(--gold); margin:0 0 4px; }
  .sub{ font-size:11px; color:#a89c7d; margin:0 0 12px; }
  .grp{ margin-bottom:14px; }
  .grp h2{ font-size:11px; letter-spacing:.5px; text-transform:uppercase; color:#a89c7d; margin:0 0 6px; }
  .row{ display:flex; flex-wrap:wrap; gap:5px; }
  button{ background:#2c281d; color:var(--text); border:1px solid var(--border); border-radius:4px;
    padding:6px 9px; font-size:12px; cursor:pointer; }
  button:hover{ border-color:var(--gold); }
  button.on{ background:var(--gold); color:#1a1710; font-weight:700; border-color:var(--gold); }
  .hint{ font-size:11px; color:#8a8168; margin-top:14px; line-height:1.5; }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage"><div id="game"></div></div>
  <div id="panel">
    <h1>Avatar Rig</h1>
    <p class="sub">Live preview of <code>src/render/avatar.js</code> — no game state, pure rendering.</p>
    <div class="grp"><h2>Hero facing</h2><div class="row" id="facing"></div></div>
    <div class="grp"><h2>Animation</h2><div class="row" id="anim"></div></div>
    <div class="grp"><h2>Weapon</h2><div class="row" id="weapon"></div></div>
    <div class="grp"><h2>Armour</h2><div class="row" id="body"></div></div>
    <div class="grp"><h2>Head / off-hand</h2><div class="row" id="acc"></div></div>
    <p class="hint">Bottom strip = the same loadout walking in all 4 directions, so you can
      check turning &amp; the walk cycle. Attack/Hit/Death loop automatically.</p>
  </div>
</div>
<script type="module">
// Cache-busted dynamic imports: the browser aggressively caches ES modules by
// URL, so a plain `import` would keep serving a stale avatar.js after edits (a
// reload/server-restart doesn't bust it). The `?v=<now>` forces a fresh fetch
// every load so this harness always reflects the current source.
const _bust = '?v=' + Date.now();
const { drawAvatar } = await import('./src/render/avatar.js' + _bust);
const { gearHints, weaponStyleFor } = await import('./src/render/gear.js' + _bust);

const PV = { facing:'S', anim:'attack', animLabel:'attack', skillType:null, tool:null, weapon:'Spear', body:'Hide', helm:null, shield:false, cape:false };

// Skill motions the avatar mimes (mirrors characters.js SKILL_TOOL) so we can
// verify gathering poses in isolation — mine=pickaxe, chop=axe, fish=rod, smith=hammer.
const SKILLMAP = {
  mine:  { skillType:'chop', tool:{ kind:'pick', color:0x8f9196, len:12 } },
  chop:  { skillType:'chop', tool:{ kind:'axe',  color:0xb5793a, len:12 } },
  fish:  { skillType:'fish', tool:{ kind:'rod',  color:0x8a5a2b, len:17 } },
  smith: { skillType:'work', tool:{ kind:'mace', color:0x6b6b6b, len:9  } },
};
function setAnim(v){
  if (SKILLMAP[v]) { PV.anim='skill'; PV.animLabel=v; PV.skillType=SKILLMAP[v].skillType; PV.tool=SKILLMAP[v].tool; }
  else { PV.anim=v; PV.animLabel=v; PV.skillType=null; PV.tool=null; }
}

// ---- control wiring -------------------------------------------------------
function mkButtons(hostId, items, getActive, onPick){
  const host = document.getElementById(hostId);
  host.innerHTML = '';
  for (const it of items){
    const b = document.createElement('button');
    b.textContent = it.label;
    b.onclick = () => { onPick(it.value); render(); };
    b.dataset.value = String(it.value);
    host.appendChild(b);
  }
  host._refresh = () => [...host.children].forEach(b =>
    b.classList.toggle('on', String(getActive()) === b.dataset.value));
}
function render(){ ['facing','anim','weapon','body','acc'].forEach(id => document.getElementById(id)._refresh()); }

mkButtons('facing', ['N','E','S','W'].map(v=>({label:v,value:v})), ()=>PV.facing, v=>PV.facing=v);
mkButtons('anim', ['idle','walk','attack','hit','dead','mine','chop','fish','smith'].map(v=>({label:v,value:v})), ()=>PV.animLabel, v=>setAnim(v));
mkButtons('weapon', ['Unarmed','Spear','Sword','Axe','Mace','Bow'].map(v=>({label:v,value:v})), ()=>PV.weapon, v=>PV.weapon=v);
mkButtons('body', ['None','Hide','Bronze'].map(v=>({label:v,value:v})), ()=>PV.body||'None', v=>PV.body=(v==='None'?null:v));
mkButtons('acc', [
  {label:'Helm',value:'helm'},{label:'Shield',value:'shield'},{label:'Cape',value:'cape'},
], ()=>'', v=>{ if(v==='helm') PV.helm=PV.helm?null:'full'; else PV[v]=!PV[v]; toggleAcc(); });
function toggleAcc(){
  const host=document.getElementById('acc');
  [...host.children].forEach(b=>{
    const v=b.dataset.value;
    const on = v==='helm'?!!PV.helm:!!PV[v];
    b.classList.toggle('on', on);
  });
}
document.getElementById('acc')._refresh = toggleAcc;
render();

// ---- equipment presets ----------------------------------------------------
const WMAP = { Spear:'goblin_spear', Sword:'bronze_scimitar', Axe:'bronze_hatchet', Mace:'bronze_mace', Bow:'goblin_shortbow' };
function buildEquipment(){
  const eq = {};
  if (PV.weapon !== 'Unarmed') eq.weapon = { id: WMAP[PV.weapon] };
  if (PV.body === 'Hide')   eq.body = { id:'goblin_hide_armor' };
  if (PV.body === 'Bronze') eq.body = { id:'bronze_platebody' };
  if (PV.helm)  eq.head = { id:'bronze_full_helm' };
  if (PV.shield) eq.shield = { id:'bronze_kiteshield' };
  if (PV.cape)  eq.cape = { id:'red_cape' };
  return eq;
}

// ---- one-shot loop timing -------------------------------------------------
const DUR = { attack:680, hit:420, dead:1900 };
function phaseFor(anim, t){
  if (!(anim in DUR)) return 0;
  const d = DUR[anim];
  if (anim === 'dead'){ const c = (t % d) / d; return c < 0.75 ? c/0.75 : 1; } // fall then hold
  return (t % d) / d;
}

// ---- scene ----------------------------------------------------------------
let gfx, label, stripLabels = [];
const scene = {
  create(){
    this.cameras.main.setBackgroundColor('#1b1a15');
    gfx = this.add.graphics();
    // ground band
    const w = this.scale.width, h = this.scale.height;
    label = this.add.text(0,0,'',{fontFamily:'monospace',fontSize:'13px',color:'#cfc6ad'}).setOrigin(0.5,1);
    for (let i=0;i<4;i++) stripLabels.push(
      this.add.text(0,0,'',{fontFamily:'monospace',fontSize:'12px',color:'#a89c7d'}).setOrigin(0.5,0));
  },
  update(time){
    const w = this.scale.width, h = this.scale.height;
    gfx.clear();
    // floor lines
    const heroGY = h*0.60, stripGY = h*0.90;
    gfx.lineStyle(1,0x39352a,1);
    gfx.beginPath(); gfx.moveTo(0,heroGY+2); gfx.lineTo(w,heroGY+2); gfx.strokePath();

    const eq = buildEquipment();
    const gear = gearHints(eq);
    const weaponStyle = weaponStyleFor(eq.weapon);
    const phase = phaseFor(PV.anim, time);

    // hero (big) — the rig draws its own ground shadow
    const heroS = 6, hx = w*0.42;
    drawAvatar(gfx, hx, heroGY, {
      facing: PV.facing, anim: PV.anim, phase, t: time,
      skillType: PV.skillType, tool: PV.tool,
      weaponStyle, gear, scale: heroS,
    });
    label.setText(`${PV.weapon} · ${PV.anim} · facing ${PV.facing} · style:${weaponStyle}`)
      .setPosition(hx, heroGY + 42);

    // body-type gallery: one of every creature silhouette drawAvatar supports,
    // so all forms (incl. the new avian/serpent + boss aura) verify at a glance.
    const FORMS = [
      { label: 'quadruped', bodyType: 'quadruped', skin: 0x8a7a5a, sz: 3.6 },
      { label: 'insectoid', bodyType: 'insectoid', skin: 0x3a3a3a, sz: 3.4 },
      { label: 'avian',     bodyType: 'avian',     skin: 0x4a3a55, sz: 3.4 },
      { label: 'serpent',   bodyType: 'serpent',   skin: 0x5a8a4a, sz: 3.4 },
      { label: 'blob',      bodyType: 'amorphous', skin: 0x6abf6a, sz: 3.4 },
      { label: 'BOSS',      bodyType: 'humanoid',  skin: 0x9a6fbf, sz: 4.2, boss: true },
    ];
    const gap = w * 0.9 / FORMS.length, x0 = w * 0.08 + gap / 2;
    for (let i = 0; i < FORMS.length; i++) {
      const f = FORMS[i], cx = x0 + i * gap;
      drawAvatar(gfx, cx, stripGY, {
        facing: PV.facing, anim: PV.anim, phase, t: time + i * 200,
        bodyType: f.bodyType, boss: f.boss, gear, weaponStyle, skin: f.skin, scale: f.sz,
      });
      if (!stripLabels[i]) stripLabels[i] = this.add.text(0, 0, '', { fontFamily: 'monospace', fontSize: '12px', color: '#a89c7d' }).setOrigin(0.5, 0);
      stripLabels[i].setText(f.label).setPosition(cx, stripGY + 18);
    }
  },
};

new Phaser.Game({
  type: Phaser.AUTO,
  parent: 'game',
  backgroundColor: '#1b1a15',
  scale: { mode: Phaser.Scale.RESIZE, parent:'game', width:'100%', height:'100%' },
  scene,
});
</script>
</body>
</html>
